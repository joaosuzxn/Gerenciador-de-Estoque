<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-C8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="notification-container">
    </div>

    <header>
        <div class="header-content">
            <div class="header-icon">
                <i class="fa-solid fa-boxes-stacked"></i>
            </div>
            <div class="header-text">
                <h1>Meu Estoque</h1>
                <p class="header-subtitle">Gerencie seus produtos com facilidade</p>
            </div>
        </div>
    </header>

    <div id="search-container">
        <div class="search-and-create-wrapper">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="input-busca" placeholder="Buscar por nome ou descrição...">
                <button id="btn-limpar-busca" class="btn-clear-search" title="Limpar busca">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <button id="btn-novo-produto" class="btn btn-novo">+ Criar Novo Produto</button>
        </div>
        <div id="search-info" class="search-info" style="display: none;">
            <div class="search-info-content">
                <i class="fa-solid fa-info-circle"></i>
                <span id="search-info-text"></span>
            </div>
        </div>
    </div>

    <main>
        <div id="loading-bar-container" style="display: none;">
            <div id="loading-bar"></div>
        </div>
        <table id="tabela-produtos">
            <thead>
                <tr>
                    <th class="sortable" data-column="nome">
                        Nome
                        <i class="fa-solid fa-sort sort-icon"></i>
                    </th>
                    <th class="sortable" data-column="descricao">
                        Descrição
                        <i class="fa-solid fa-sort sort-icon"></i>
                    </th>
                    <th class="sortable" data-column="quantidade">
                        Qtd.
                        <i class="fa-solid fa-sort sort-icon"></i>
                    </th>
                    <th class="sortable" data-column="preco">
                        Preço (R$)
                        <i class="fa-solid fa-sort sort-icon"></i>
                    </th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                </tbody>
        </table>
    </main>

    <div id="paginacao-container">
        </div>

    <div id="modal-produto" class="modal-overlay">
        <div class="modal-content modal-produto-content">
            <div class="modal-header">
                <div class="modal-icon-container" id="modal-icon-container">
                    <i class="fa-solid fa-plus" id="modal-icon"></i>
                </div>
                <h2 id="modal-titulo">Novo Produto</h2>
                <button type="button" class="modal-close" id="btn-fechar-modal">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <form id="form-produto">
                <input type="hidden" id="produto-id">
                
                <div class="form-group">
                    <label for="nome_produto">
                        <i class="fa-solid fa-tag"></i>
                        Nome do Produto <span class="required">*</span>
                    </label>
                    <input type="text" id="nome_produto" placeholder="Digite o nome do produto" required>
                    <span class="error-message" id="error-nome_produto"></span>
                </div>
                
                <div class="form-group">
                    <label for="descricao">
                        <i class="fa-solid fa-align-left"></i>
                        Descrição <span class="required">*</span>
                    </label>
                    <textarea id="descricao" rows="3" placeholder="Digite a descrição do produto" required></textarea>
                    <span class="error-message" id="error-descricao"></span>
                </div>
                
                <div class="form-group-inline">
                    <div class="form-group">
                        <label for="quantidade">
                            <i class="fa-solid fa-boxes-stacked"></i>
                            Quantidade <span class="required">*</span>
                        </label>
                        <input type="number" id="quantidade" min="0" placeholder="0" required>
                        <span class="error-message" id="error-quantidade"></span>
                    </div>
                    <div class="form-group">
                        <label for="preco">
                            <i class="fa-solid fa-dollar-sign"></i>
                            Preço (R$) <span class="required">*</span>
                        </label>
                        <input type="text" id="preco" placeholder="0,00" min="0" required>
                        <span class="error-message" id="error-preco"></span>
                    </div>
                </div>

                <div class="modal-botoes">
                    <button type="button" id="btn-cancelar" class="btn btn-cancelar">
                        <i class="fa-solid fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-salvar">
                        <i class="fa-solid fa-check"></i> Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-confirmacao" class="modal-overlay">
        <div class="modal-content modal-confirmacao-content">
            <div class="modal-confirmacao-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h2 id="modal-confirmacao-titulo">Confirmar Exclusão</h2>
            <p>Tem certeza que deseja excluir este produto? Esta ação não pode ser desfeita.</p>
            <div class="modal-botoes">
                <button type="button" id="btn-confirmar-nao" class="btn btn-cancelar">Não, cancelar</button>
                <button type="button" id="btn-confirmar-sim" class="btn btn-excluir">
                    <i class="fa-solid fa-trash"></i> Sim, excluir
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
